version: '3.8'

services:
  # Redis message broker for Celery
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

  # Django Web Service
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: always

  # Celery Worker for background tasks
  worker:
    build: .
    command: celery -A core worker -l info
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: always
