<div id="attendance-row-{{ student.id }}" 
     class="w-full flex items-center justify-between gap-1 bg-slate-950/60 p-1 rounded-xl border border-slate-800/80 shadow-inner relative overflow-hidden transition-all duration-300 {% if htmx_updated %}border-emerald-500/50 bg-slate-900/40{% endif %}"
     x-data="{ updated: false }"
     x-init="{% if request.META.HTTP_HX_REQUEST %}updated = true; setTimeout(() => updated = false, 1000){% endif %}">

    <!-- Present Button -->
    <button hx-post="{% url 'mark_attendance' session.id %}"
            hx-vals='{"student_id": "{{ student.id }}", "status": "present"}'
            hx-target="#attendance-row-{{ student.id }}"
            hx-swap="outerHTML"
            class="flex-1 text-center py-2 px-1 text-xs font-semibold rounded-lg border transition duration-200 
            {% if attendance.status == 'present' %}
                bg-emerald-500 text-slate-950 border-emerald-500 font-bold shadow-lg shadow-emerald-500/15
            {% else %}
                bg-transparent text-slate-400 border-transparent hover:text-emerald-400 hover:bg-emerald-500/5 hover:border-emerald-500/20
            {% endif %}">
        P
    </button>

    <!-- Late Button -->
    <button hx-post="{% url 'mark_attendance' session.id %}"
            hx-vals='{"student_id": "{{ student.id }}", "status": "late"}'
            hx-target="#attendance-row-{{ student.id }}"
            hx-swap="outerHTML"
            class="flex-1 text-center py-2 px-1 text-xs font-semibold rounded-lg border transition duration-200 
            {% if attendance.status == 'late' %}
                bg-amber-500 text-slate-950 border-amber-500 font-bold shadow-lg shadow-amber-500/15
            {% else %}
                bg-transparent text-slate-400 border-transparent hover:text-amber-400 hover:bg-amber-500/5 hover:border-amber-500/20
            {% endif %}">
        T
    </button>

    <!-- Excused Button -->
    <button hx-post="{% url 'mark_attendance' session.id %}"
            hx-vals='{"student_id": "{{ student.id }}", "status": "excused"}'
            hx-target="#attendance-row-{{ student.id }}"
            hx-swap="outerHTML"
            class="flex-1 text-center py-2 px-1 text-xs font-semibold rounded-lg border transition duration-200 
            {% if attendance.status == 'excused' %}
                bg-purple-500 text-slate-950 border-purple-500 font-bold shadow-lg shadow-purple-500/15
            {% else %}
                bg-transparent text-slate-400 border-transparent hover:text-purple-400 hover:bg-purple-500/5 hover:border-purple-500/20
            {% endif %}">
        E
    </button>

    <!-- Absent Button -->
    <button hx-post="{% url 'mark_attendance' session.id %}"
            hx-vals='{"student_id": "{{ student.id }}", "status": "absent"}'
            hx-target="#attendance-row-{{ student.id }}"
            hx-swap="outerHTML"
            class="flex-1 text-center py-2 px-1 text-xs font-semibold rounded-lg border transition duration-200 
            {% if attendance.status == 'absent' %}
                bg-rose-500 text-slate-950 border-rose-500 font-bold shadow-lg shadow-rose-500/15
            {% else %}
                bg-transparent text-slate-400 border-transparent hover:text-rose-400 hover:bg-rose-500/5 hover:border-rose-500/20
            {% endif %}">
        A
    </button>

    <!-- Success flash feedback -->
    <div x-show="updated" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-300"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95"
         class="absolute inset-0 flex items-center justify-center bg-emerald-500 text-slate-950 text-[10px] font-bold uppercase tracking-wider rounded-xl select-none pointer-events-none"
         x-cloak>
        Guardado ✓
    </div>

</div>
